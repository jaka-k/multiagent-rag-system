[alembic]
# Path to the migrations directory, relative to this file.
script_location = migrations

# Naming convention for generated migration files:
#   YYYYMMDD_HHMM_<short-rev>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Add the directory containing alembic.ini (i.e. backend/) to sys.path so that
# "from server..." imports work inside env.py and migration scripts.
prepend_sys_path = .

# Emit timestamps in UTC.
timezone = UTC

# The database URL is intentionally left blank here.
# env.py reads it from pydantic Settings (server.core.config) so that the same
# .env file drives both the application and the migration tooling.
sqlalchemy.url =

# Increase the default output length for SQL statements in logs.
output_encoding = utf-8


[post_write_hooks]
# Uncomment to auto-format generated migration files with black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
